<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CCNO Evidence Portal | Nakuru County</title>
  
  <!-- PWA Configuration -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f3b3c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/images/LOGO.png">
  <meta name="msapplication-TileColor" content="#0f3b3c">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- External Stylesheet -->
  <link rel="stylesheet" href="/style.css">
  
  <style>
    /* Critical fallback styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f4f7fb; color: #1e293b; line-height: 1.5; }
    .skip-link { position: absolute; top: -40px; left: 0; background: #0f766e; color: white; padding: 8px 16px; z-index: 100; border-radius: 0 0 8px 0; text-decoration: none; }
    .skip-link:focus { top: 0; }
    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    .site-header { background: white; display: flex; align-items: center; gap: 1.2rem; padding: 1rem 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-bottom: 3px solid #0f766e; flex-wrap: wrap; }
    .logo { height: 60px; width: auto; }
    .upload-btn, .install-btn { background: #0f766e; color: white; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 10px; font-size: 1rem; }
    .upload-btn:hover { background: #0b5e58; transform: translateY(-1px); }
    .form-group { margin-bottom: 1.5rem; }
    input, select, .file-upload-wrapper { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 16px; font-size: 1rem; transition: 0.2s; background: white; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(3px); }
    .modal { background: white; border-radius: 28px; max-width: 420px; width: 90%; overflow: hidden; box-shadow: 0 25px 40px rgba(0,0,0,0.2); animation: fadeInUp 0.2s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .success { background: #dcfce7; color: #15803d; padding: 12px; border-radius: 16px; margin: 16px 0; display: none; align-items: center; gap: 8px; }
    .error { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 16px; margin: 16px 0; display: none; align-items: center; gap: 8px; }
    .progress-container { height: 8px; background: #e2e8f0; border-radius: 20px; overflow: hidden; margin: 12px 0; display: none; }
    .progress-bar { height: 100%; background: #0f766e; width: 0%; transition: width 0.2s; }
    .indicator-loading { text-align: center; padding: 20px; color: #64748b; }
    .category-badge { background: #e0f2fe; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
  </style>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>
<div class="sr-only" aria-live="polite" aria-atomic="true" id="liveRegion"></div>

<!-- Custom Modal Component -->
<div class="modal-overlay" id="customModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-header" style="background: #0f766e; padding: 1.2rem 1.5rem; color: white; display: flex; justify-content: space-between; align-items: center;">
      <h3 id="modalTitle" style="margin:0">Notification</h3>
      <button id="modalClose" class="modal-close" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
    </div>
    <div class="modal-body" style="padding: 1.5rem;">
      <p id="modalMessage" style="margin-bottom: 1.5rem;"></p>
      <div style="display: flex; gap: 12px; justify-content: flex-end;">
        <button id="modalCancel" style="padding: 8px 20px; background: #e2e8f0; border: none; border-radius: 40px; font-weight: 500; cursor: pointer;">Cancel</button>
        <button id="modalConfirm" style="padding: 8px 20px; background: #0f766e; color: white; border: none; border-radius: 40px; font-weight: 500; cursor: pointer;">Confirm</button>
      </div>
    </div>
  </div>
</div>

<header class="site-header">
  <img src="/images/LOGO.png" alt="Nakuru County Logo" class="logo" onerror="this.src='https://placehold.co/60x60?text=Nakuru'">
  <div>
    <h1 style="font-size: 1.4rem; color: #0f3b3c;">Nakuru County CCNO</h1>
    <p style="color: #475569;">PC Evidence Upload System • FY 2025/2026</p>
  </div>
</header>

<main id="main-content" class="container">
  <div class="form-card" style="background: white; border-radius: 32px; padding: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 1.8rem;">
      <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #0f766e;"></i>
      <h2 style="font-weight: 600;">Submit Program Evidence</h2>
    </div>

    <form id="uploadForm">
      <!-- Officer Email -->
      <div class="form-group required">
        <label style="font-weight: 500; display: block; margin-bottom: 6px;"><i class="fas fa-envelope"></i> Officer Email *</label>
        <input list="officerEmails" id="officerEmail" placeholder="name@nakuru.go.ke" type="email" required pattern="[^@\s]+@[^@\s]+\.[^@\s]+">
        <datalist id="officerEmails"></datalist>
        <div class="validation-message" id="emailValidation" style="font-size: 0.8rem; margin-top: 5px;"></div>
      </div>

      <!-- Evidence Name -->
      <div class="form-group required">
        <label style="font-weight: 500;"><i class="fas fa-file-signature"></i> Evidence Name *</label>
        <input type="text" id="evidenceName" placeholder="e.g., CME on Family Planning Methods" required>
        <div class="validation-message" id="nameValidation"></div>
      </div>

      <!-- Category & Indicator -->
      <div class="form-group required">
        <label style="font-weight: 500;"><i class="fas fa-folder"></i> Evidence Category *</label>
        <select id="category" required>
          <option value="">Loading categories...</option>
        </select>
        <div class="validation-message" id="categoryValidation"></div>
      </div>

      <div class="form-group required">
        <label style="font-weight: 500;"><i class="fas fa-chart-line"></i> Indicator *</label>
        <select id="indicator" required disabled>
          <option value="">First select a category</option>
        </select>
        <div class="validation-message" id="indicatorValidation"></div>
      </div>

      <!-- Sub County -->
      <div class="form-group required">
        <label style="font-weight: 500;"><i class="fas fa-map-marker-alt"></i> Sub County *</label>
        <select id="subCounty" required>
          <option value="">Select Sub County</option>
          <option value="Nakuru West">Nakuru West</option>
          <option value="Nakuru East">Nakuru East</option>
          <option value="Nakuru North">Nakuru North</option>
          <option value="Naivasha">Naivasha</option>
          <option value="Rongai">Rongai</option>
          <option value="Kuresoi South">Kuresoi South</option>
          <option value="Kuresoi North">Kuresoi North</option>
          <option value="Subukia">Subukia</option>
          <option value="Molo">Molo</option>
          <option value="Njoro">Njoro</option>
          <option value="Gilgil">Gilgil</option>
        </select>
        <div class="validation-message" id="subCountyValidation"></div>
      </div>

      <!-- File Upload with Drag & Drop -->
      <div class="form-group required">
        <label style="font-weight: 500;"><i class="fas fa-file-pdf"></i> Upload PDF(s) *</label>
        <div id="fileDropZone" style="border: 2px dashed #cbd5e1; border-radius: 24px; padding: 1.8rem; text-align: center; cursor: pointer; transition: 0.2s; background: #fafcff;">
          <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #0f766e;"></i>
          <p>Drag & drop PDF files here or click to browse</p>
          <input type="file" id="files" accept="application/pdf" multiple style="display: none;">
          <button type="button" id="browseBtn" style="margin-top: 10px; background: #e6f7f5; border: none; padding: 6px 18px; border-radius: 40px; cursor: pointer;">Choose Files</button>
        </div>
        <div class="validation-message" id="filesValidation"></div>
        <div id="filePreview" style="margin-top: 16px; display: none;"></div>
        <div id="fileStats" style="font-size: 0.8rem; margin-top: 6px;"></div>
      </div>

      <div class="spinner" id="spinner" style="display: none; text-align: center;"><i class="fas fa-spinner fa-spin fa-2x" style="color:#0f766e;"></i></div>
      <div class="progress-container" id="progressContainer" style="display: none;">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div id="uploadText" style="font-size: 0.85rem; text-align: center; margin: 8px 0; display: none;"></div>
      <div class="success" id="success"></div>
      <div class="error" id="error"></div>

      <button type="button" id="uploadBtn" class="upload-btn" style="width: 100%; justify-content: center; margin: 8px 0;">
        <i class="fas fa-cloud-upload-alt"></i> Upload Evidence
      </button>
      <button type="button" id="installBtn" class="install-btn" style="display: none; width: 100%; background: #334155; justify-content: center;">
        <i class="fas fa-download"></i> Install App
      </button>
    </form>
  </div>

  <!-- Upload History Section -->
  <div id="historySection" style="margin-top: 2rem; display: none;">
    <div style="background: white; border-radius: 28px; padding: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h3><i class="fas fa-history"></i> Recent Uploads</h3>
        <button id="refreshHistory" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;"><i class="fas fa-sync-alt"></i></button>
      </div>
      <div id="historyList"></div>
      <div id="emptyHistory" style="text-align: center; padding: 2rem; color: #64748b;"><i class="fas fa-inbox fa-2x"></i><p>No uploads yet</p></div>
    </div>
  </div>
</main>

<footer style="text-align: center; padding: 1.5rem; background: #0f3b3c; color: white; margin-top: 3rem;">
  <p>© 2025 Nakuru County Chief Nursing Officer. Secure Evidence Portal v3.0</p>
  <p id="connectionStatus" style="font-size: 0.8rem;"><i class="fas fa-wifi"></i> Online</p>
</footer>

<div id="saveStatus" style="position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 10px 18px; border-radius: 40px; font-size: 0.85rem; display: none; z-index: 999;"></div>

<script>
  // ======================== GLOBALS & CONFIG ========================
  const IS_PWA = window.matchMedia('(display-mode: standalone)').matches;
  const BASE_URL = window.location.origin;
  const PROXY_URL = "https://nccnoproxyy.onrender.com/upload-evidence";
  let indicatorsData = null;
  let isOnline = navigator.onLine;
  let deferredPrompt = null;
  let modalResolve = null;
  const MAX_FILE_SIZE = 10 * 1024 * 1024;
  const MAX_TOTAL_SIZE = 50 * 1024 * 1024;

  // DOM refs
  const officerEmail = document.getElementById('officerEmail');
  const evidenceName = document.getElementById('evidenceName');
  const categorySelect = document.getElementById('category');
  const indicatorSelect = document.getElementById('indicator');
  const subCountySelect = document.getElementById('subCounty');
  const fileInput = document.getElementById('files');
  const fileDropZone = document.getElementById('fileDropZone');
  const browseBtn = document.getElementById('browseBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  const successDiv = document.getElementById('success');
  const errorDiv = document.getElementById('error');
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');
  const uploadText = document.getElementById('uploadText');
  const spinner = document.getElementById('spinner');
  const filePreview = document.getElementById('filePreview');
  const fileStats = document.getElementById('fileStats');
  const historySection = document.getElementById('historySection');
  const historyList = document.getElementById('historyList');
  const emptyHistoryDiv = document.getElementById('emptyHistory');
  const refreshHistoryBtn = document.getElementById('refreshHistory');
  const installBtn = document.getElementById('installBtn');
  const connectionSpan = document.getElementById('connectionStatus');
  const liveRegion = document.getElementById('liveRegion');
  
  // Modal elements
  const modalOverlay = document.getElementById('customModal');
  const modalConfirmBtn = document.getElementById('modalConfirm');
  const modalCancelBtn = document.getElementById('modalCancel');
  const modalCloseBtn = document.getElementById('modalClose');
  const modalMessageSpan = document.getElementById('modalMessage');
  const modalTitleSpan = document.getElementById('modalTitle');

  let isUploadingFlag = false;

  // Helper functions
  function formatBytes(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
  }

  function showError(msg) {
    errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
    errorDiv.style.display = 'flex';
    successDiv.style.display = 'none';
    liveRegion.textContent = `Error: ${msg}`;
    setTimeout(() => { if(errorDiv.style.display === 'flex') errorDiv.style.display = 'none'; }, 5000);
  }
  
  function showSuccess(msg) {
    successDiv.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
    successDiv.style.display = 'flex';
    errorDiv.style.display = 'none';
    liveRegion.textContent = msg;
    setTimeout(() => { if(successDiv.style.display === 'flex') successDiv.style.display = 'none'; }, 5000);
  }
  
  function showSaveStatus(msg, type = 'info') {
    const statusDiv = document.getElementById('saveStatus');
    statusDiv.innerHTML = `<i class="fas ${type === 'saved' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`;
    statusDiv.style.display = 'flex';
    setTimeout(() => statusDiv.style.display = 'none', 3000);
  }
  
  function isValidEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

  // Custom Modal Promise
  function showModal(title, message, confirmText = 'Confirm', cancelText = 'Cancel') {
    return new Promise((resolve) => {
      modalTitleSpan.innerText = title;
      modalMessageSpan.innerText = message;
      modalConfirmBtn.innerText = confirmText;
      modalCancelBtn.innerText = cancelText;
      modalOverlay.style.display = 'flex';
      modalResolve = resolve;
      modalConfirmBtn.focus();
    });
  }
  
  function closeModal(result = false) {
    modalOverlay.style.display = 'none';
    if (modalResolve) modalResolve(result);
  }
  
  modalConfirmBtn.onclick = () => closeModal(true);
  modalCancelBtn.onclick = () => closeModal(false);
  modalCloseBtn.onclick = () => closeModal(false);
  modalOverlay.onclick = (e) => { if(e.target === modalOverlay) closeModal(false); };

  // File validation (PDF magic number)
  async function validatePdfFile(file) {
    return new Promise((resolve, reject) => {
      if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
        reject(new Error('Only PDF files allowed'));
        return;
      }
      if (file.size === 0) {
        reject(new Error('Empty file'));
        return;
      }
      if (file.size > MAX_FILE_SIZE) {
        reject(new Error(`Exceeds ${formatBytes(MAX_FILE_SIZE)}`));
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        const arr = new Uint8Array(e.target.result);
        if (arr.length < 4) {
          reject(new Error('Invalid PDF'));
          return;
        }
        const header = Array.from(arr.slice(0,4)).map(b => b.toString(16).padStart(2,'0')).join('');
        // Check for PDF magic number %PDF (25 50 44 46)
        if (header !== '25504446' && header.substring(0,6) !== '252150') {
          reject(new Error('Not a valid PDF document'));
          return;
        }
        resolve();
      };
      reader.onerror = () => reject(new Error('File read error'));
      reader.readAsArrayBuffer(file.slice(0, 1024));
    });
  }

  // Update file preview & validation
  async function updateFilePreviewUI() {
    const files = Array.from(fileInput.files);
    if (!files.length) { 
      filePreview.style.display = 'none'; 
      fileStats.innerText = ''; 
      uploadBtn.disabled = false; 
      return; 
    }
    let totalSize = 0;
    let errors = [];
    filePreview.style.display = 'block';
    filePreview.innerHTML = '<div style="font-weight:500; margin-bottom:8px;">📄 Selected files:</div>';
    
    for (let f of files) {
      totalSize += f.size;
      let valid = true;
      let errMsg = '';
      try { 
        await validatePdfFile(f); 
      } catch(e) { 
        valid = false; 
        errMsg = e.message; 
        errors.push(`${f.name}: ${errMsg}`);
      }
      const icon = valid ? '✅' : '❌';
      const statusColor = valid ? '#10b981' : '#ef4444';
      filePreview.innerHTML += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #e2e8f0; padding:6px 0;">
        <span>${icon} ${f.name} (${formatBytes(f.size)})</span>
        <span style="color:${statusColor}; font-size:0.8rem;">${valid ? '✓ Ready' : errMsg}</span>
      </div>`;
    }
    
    const totalLimitExceed = totalSize > MAX_TOTAL_SIZE;
    if (totalLimitExceed) errors.push(`Total size ${formatBytes(totalSize)} exceeds limit ${formatBytes(MAX_TOTAL_SIZE)}`);
    
    fileStats.innerHTML = `${files.length} file(s) | Total: ${formatBytes(totalSize)} ${totalLimitExceed ? '⚠️ Exceeds limit' : ''}`;
    uploadBtn.disabled = (errors.length > 0);
    
    if (uploadBtn.disabled) {
      showError(`Validation issues: ${errors.slice(0,2).join(', ')}`);
    } else {
      errorDiv.style.display = 'none';
    }
  }

  // Load Indicators from original indicators.json
  function loadIndicators() {
    console.log('🔄 Loading indicators from /indicators.json...');
    categorySelect.innerHTML = '<option value="">Loading categories...</option>';
    indicatorSelect.innerHTML = '<option value="">Loading indicators...</option>';
    indicatorSelect.disabled = true;
    
    // Try to fetch from the original path
    fetch('/indicators.json')
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: Could not load indicators.json`);
        }
        return response.json();
      })
      .then(data => {
        console.log('✅ Original indicators loaded successfully:', data);
        indicatorsData = data;
        
        // Populate categories
        categorySelect.innerHTML = '<option value="">Select Evidence Category</option>';
        const categories = Object.keys(data);
        
        if (categories.length === 0) {
          throw new Error('No categories found in indicators.json');
        }
        
        categories.forEach(category => {
          const opt = document.createElement('option');
          opt.value = category;
          opt.textContent = category;
          categorySelect.appendChild(opt);
        });
        
        // Enable category selection
        categorySelect.disabled = false;
        
        // Setup category change handler
        categorySelect.addEventListener('change', function() {
          const selectedCategory = this.value;
          console.log('📂 Category selected:', selectedCategory);
          
          if (!selectedCategory || !indicatorsData[selectedCategory]) {
            indicatorSelect.innerHTML = '<option value="">Select Indicator</option>';
            indicatorSelect.disabled = true;
            return;
          }
          
          const indicators = indicatorsData[selectedCategory];
          console.log(`📊 Loading ${indicators.length} indicators for ${selectedCategory}`);
          
          indicatorSelect.innerHTML = '<option value="">Select Indicator</option>';
          indicators.forEach(indicator => {
            const opt = document.createElement('option');
            opt.value = indicator;
            opt.textContent = indicator;
            indicatorSelect.appendChild(opt);
          });
          indicatorSelect.disabled = false;
        });
        
        showSaveStatus(`Loaded ${categories.length} categories`, 'saved');
        liveRegion.textContent = `Indicators loaded successfully. ${categories.length} categories available.`;
      })
      .catch(err => {
        console.error('❌ Error loading indicators.json:', err);
        console.warn('Attempting to load from alternative path...');
        
        // Try alternative path
        fetch('indicators.json')
          .then(response => {
            if (!response.ok) throw new Error('Alternative path also failed');
            return response.json();
          })
          .then(data => {
            console.log('✅ Indicators loaded from alternative path');
            indicatorsData = data;
            categorySelect.innerHTML = '<option value="">Select Evidence Category</option>';
            Object.keys(data).forEach(category => {
              const opt = document.createElement('option');
              opt.value = category;
              opt.textContent = category;
              categorySelect.appendChild(opt);
            });
            categorySelect.addEventListener('change', function() {
              const selectedCategory = this.value;
              if (!selectedCategory || !indicatorsData[selectedCategory]) {
                indicatorSelect.innerHTML = '<option value="">Select Indicator</option>';
                indicatorSelect.disabled = true;
                return;
              }
              indicatorSelect.innerHTML = '<option value="">Select Indicator</option>';
              indicatorsData[selectedCategory].forEach(indicator => {
                const opt = document.createElement('option');
                opt.value = indicator;
                opt.textContent = indicator;
                indicatorSelect.appendChild(opt);
              });
              indicatorSelect.disabled = false;
            });
          })
          .catch(finalErr => {
            console.error('❌ Failed to load indicators from all paths');
            categorySelect.innerHTML = '<option value="">Error loading categories</option>';
            showError('Unable to load indicators. Please check your connection and refresh the page.');
            
            // Provide manual entry option as fallback
            indicatorSelect.innerHTML = '<option value="">Manual entry mode</option>';
            indicatorSelect.disabled = false;
          });
      });
  }

  // Save to localStorage history
  function addToHistory(uploadData) {
    const history = JSON.parse(localStorage.getItem('uploadHistory') || '[]');
    history.unshift({ 
      id: Date.now(), 
      evidenceName: uploadData.evidenceName,
      category: uploadData.category,
      indicator: uploadData.indicator,
      filesCount: uploadData.filesCount, 
      subCounty: uploadData.subCounty, 
      totalSize: uploadData.totalSize,
      timestamp: new Date().toISOString() 
    });
    localStorage.setItem('uploadHistory', JSON.stringify(history.slice(0, 10)));
    renderHistory();
  }
  
  function renderHistory() {
    const history = JSON.parse(localStorage.getItem('uploadHistory') || '[]');
    if (history.length) {
      historySection.style.display = 'block';
      emptyHistoryDiv.style.display = 'none';
      historyList.innerHTML = '';
      history.forEach(item => {
        const el = document.createElement('div');
        el.style.borderBottom = '1px solid #e2e8f0'; 
        el.style.padding = '12px 0';
        el.innerHTML = `
          <div><strong>${item.evidenceName}</strong></div>
          <div style="font-size:0.8rem; color:#64748b; margin-top:4px;">
            ${new Date(item.timestamp).toLocaleString()} • ${item.filesCount} file(s) • ${item.subCounty}
            <br><span class="category-badge">${item.category || 'N/A'}</span> → ${item.indicator || 'N/A'}
          </div>
        `;
        historyList.appendChild(el);
      });
    } else {
      historySection.style.display = 'none';
      emptyHistoryDiv.style.display = 'block';
    }
  }

  // Auto-save draft
  function autoSaveDraft() {
    const draft = {
      officerEmail: officerEmail.value,
      evidenceName: evidenceName.value,
      category: categorySelect.value,
      indicator: indicatorSelect.value,
      subCounty: subCountySelect.value,
      ts: Date.now()
    };
    localStorage.setItem('uploadDraft', JSON.stringify(draft));
    showSaveStatus('Draft auto-saved', 'saved');
  }
  
  async function restoreDraft() {
    const raw = localStorage.getItem('uploadDraft');
    if (!raw) return;
    const draft = JSON.parse(raw);
    if (draft.ts && (Date.now() - draft.ts) < 24 * 3600 * 1000) {
      const restore = await showModal('Restore Draft', 'We found a saved draft from earlier. Restore it?', 'Restore', 'Discard');
      if (restore) {
        officerEmail.value = draft.officerEmail || '';
        evidenceName.value = draft.evidenceName || '';
        if (draft.category && indicatorsData && indicatorsData[draft.category]) {
          categorySelect.value = draft.category;
          categorySelect.dispatchEvent(new Event('change'));
          setTimeout(() => { 
            if (draft.indicator) indicatorSelect.value = draft.indicator; 
          }, 150);
        } else if (draft.category) {
          categorySelect.value = draft.category;
        }
        subCountySelect.value = draft.subCounty || '';
        showSaveStatus('Draft restored', 'saved');
      }
    }
  }

  // Upload Logic
  uploadBtn.addEventListener('click', async () => {
    const email = officerEmail.value.trim();
    const evName = evidenceName.value.trim();
    const cat = categorySelect.value;
    const ind = indicatorSelect.value;
    const subCo = subCountySelect.value;
    const files = fileInput.files;
    
    if (!isValidEmail(email)) return showError('Valid officer email required');
    if (!evName) return showError('Evidence name required');
    if (!cat || cat === 'Loading categories...') return showError('Please select a valid category');
    if (!ind || ind === 'Select Indicator') return showError('Please select an indicator');
    if (!subCo) return showError('Select Sub County');
    if (files.length === 0) return showError('Select at least one PDF');
    
    let totalBytes = 0;
    for(let f of files) totalBytes += f.size;
    if (totalBytes > MAX_TOTAL_SIZE) return showError(`Total size exceeds ${formatBytes(MAX_TOTAL_SIZE)}`);
    
    isUploadingFlag = true;
    uploadBtn.disabled = true;
    uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
    spinner.style.display = 'block';
    progressContainer.style.display = 'block';
    progressBar.style.width = '0%';
    uploadText.style.display = 'block';
    uploadText.innerText = 'Uploading 0%';
    errorDiv.style.display = 'none';
    
    const formData = new FormData();
    formData.append('officerEmail', email);
    formData.append('evidenceName', evName);
    formData.append('category', cat);
    formData.append('indicator', ind);
    formData.append('subCounty', subCo);
    for (let file of files) formData.append('files', file);
    
    const xhr = new XMLHttpRequest();
    xhr.open('POST', PROXY_URL, true);
    xhr.timeout = 300000;
    
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const percent = Math.round((e.loaded / e.total) * 100);
        progressBar.style.width = percent + '%';
        uploadText.innerText = `Uploading ${percent}%`;
      }
    };
    
    xhr.onload = () => {
      spinner.style.display = 'none';
      progressContainer.style.display = 'none';
      uploadText.style.display = 'none';
      
      if (xhr.status >= 200 && xhr.status < 300) {
        showSuccess(`✅ ${files.length} file(s) submitted successfully! Confirmation sent to ${email}`);
        addToHistory({ 
          evidenceName: evName, 
          category: cat,
          indicator: ind,
          filesCount: files.length, 
          subCounty: subCo, 
          totalSize: totalBytes 
        });
        fileInput.value = ''; 
        updateFilePreviewUI();
        localStorage.removeItem('uploadDraft');
        
        // Save email for suggestions
        let emails = JSON.parse(localStorage.getItem('officerEmails') || '[]');
        if (!emails.includes(email)) emails.push(email);
        localStorage.setItem('officerEmails', JSON.stringify(emails.slice(-10)));
      } else {
        showError(`Upload failed (${xhr.status}). Please try again.`);
      }
      uploadBtn.disabled = false;
      uploadBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Upload Evidence';
      isUploadingFlag = false;
    };
    
    xhr.onerror = () => {
      showError('Network error. Please check your connection.');
      uploadBtn.disabled = false;
      uploadBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Upload Evidence';
      spinner.style.display = 'none';
      progressContainer.style.display = 'none';
      isUploadingFlag = false;
    };
    
    xhr.ontimeout = () => {
      showError('Upload timeout. Please try again with smaller files.');
      uploadBtn.disabled = false;
      uploadBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Upload Evidence';
      spinner.style.display = 'none';
      progressContainer.style.display = 'none';
      isUploadingFlag = false;
    };
    
    xhr.send(formData);
  });

  // File drag-drop handlers
  fileDropZone.addEventListener('click', () => fileInput.click());
  browseBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', updateFilePreviewUI);
  
  fileDropZone.addEventListener('dragover', (e) => { 
    e.preventDefault(); 
    fileDropZone.style.borderColor = '#0f766e';
    fileDropZone.style.background = '#f0fdf4';
  });
  
  fileDropZone.addEventListener('dragleave', () => { 
    fileDropZone.style.borderColor = '#cbd5e1';
    fileDropZone.style.background = '#fafcff';
  });
  
  fileDropZone.addEventListener('drop', (e) => {
    e.preventDefault(); 
    fileDropZone.style.borderColor = '#cbd5e1';
    fileDropZone.style.background = '#fafcff';
    if (e.dataTransfer.files.length) { 
      fileInput.files = e.dataTransfer.files; 
      updateFilePreviewUI(); 
    }
  });

  // Offline / Online
  function updateOnlineStatus() {
    isOnline = navigator.onLine;
    connectionSpan.innerHTML = isOnline ? '<i class="fas fa-wifi"></i> Online' : '<i class="fas fa-wifi-slash"></i> Offline';
    if (!isOnline) {
      showError('You are offline — uploads will resume when online.');
    }
  }
  
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);

  // PWA Install
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); 
    deferredPrompt = e; 
    installBtn.style.display = 'flex';
    installBtn.onclick = () => { 
      if (deferredPrompt) { 
        deferredPrompt.prompt(); 
        deferredPrompt = null; 
        installBtn.style.display = 'none'; 
      } 
    };
  });

  // Email suggestions
  officerEmail.addEventListener('focus', () => {
    const datalist = document.getElementById('officerEmails');
    datalist.innerHTML = '';
    let emails = JSON.parse(localStorage.getItem('officerEmails') || '[]');
    emails.forEach(e => { 
      let opt = document.createElement('option'); 
      opt.value = e; 
      datalist.appendChild(opt); 
    });
  });

  // Live email validation
  officerEmail.addEventListener('input', () => {
    const val = officerEmail.value;
    const msgDiv = document.getElementById('emailValidation');
    if (val && !isValidEmail(val)) {
      msgDiv.innerHTML = '⚠️ Please enter a valid email address';
      msgDiv.style.color = '#dc2626';
    } else if (val && isValidEmail(val)) {
      msgDiv.innerHTML = '✓ Valid email format';
      msgDiv.style.color = '#10b981';
    } else {
      msgDiv.innerHTML = '';
    }
  });

  // Evidence name validation
  evidenceName.addEventListener('input', () => {
    const val = evidenceName.value;
    const msgDiv = document.getElementById('nameValidation');
    if (val.length > 0 && val.length < 3) {
      msgDiv.innerHTML = '⚠️ Evidence name should be at least 3 characters';
      msgDiv.style.color = '#dc2626';
    } else if (val.length >= 3) {
      msgDiv.innerHTML = '✓ Valid';
      msgDiv.style.color = '#10b981';
    } else {
      msgDiv.innerHTML = '';
    }
  });

  // Initialize everything
  window.addEventListener('load', async () => {
    console.log('🚀 App initializing...');
    loadIndicators();
    renderHistory();
    updateOnlineStatus();
    await restoreDraft();
    
    // Auto-save every 30 seconds
    setInterval(autoSaveDraft, 30000);
    
    // Focus on email field
    setTimeout(() => officerEmail.focus(), 100);
    
    console.log('✅ App ready');
    liveRegion.textContent = 'Application ready. Please fill in the form to upload evidence.';
  });
  
  refreshHistoryBtn.addEventListener('click', renderHistory);
  
  // Before unload warning
  window.addEventListener('beforeunload', (e) => {
    const hasData = officerEmail.value || evidenceName.value || categorySelect.value;
    if (hasData && !isUploadingFlag) {
      autoSaveDraft();
      e.preventDefault();
      e.returnValue = 'You have unsaved changes. Are you sure you want to leave?';
      return e.returnValue;
    }
  });
</script>
</body>
</html>
